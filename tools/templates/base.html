<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ config.site_title }}{% endblock %}</title>
<script>
  // Apply a saved theme choice before paint to avoid a flash of the wrong theme.
  (function(){try{var t=localStorage.getItem('theme');
    if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<style>
  :root{
    color-scheme: light dark;
    --bg:#f5f5f3; --panel:#ffffff; --ink:#1b1e23; --muted:#5c6470;
    --accent:#0c8f57; --line:#e0e3e8; --chip:#edeff2; --thumb-bg:#eceef1;
  }
  /* Follow the OS when the visitor hasn't chosen — unless they've forced light. */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#0f1115; --panel:#171a21; --ink:#e8eaed; --muted:#9aa4b2;
      --accent:#36c98d; --line:#2a2f3a; --chip:#222733; --thumb-bg:#0b0d11;
    }
  }
  /* An explicit manual choice always wins. */
  :root[data-theme="dark"]{
    --bg:#0f1115; --panel:#171a21; --ink:#e8eaed; --muted:#9aa4b2;
    --accent:#36c98d; --line:#2a2f3a; --chip:#222733; --thumb-bg:#0b0d11;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
       background:var(--bg);color:var(--ink);line-height:1.55}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  header.site{padding:20px 18px;border-bottom:1px solid var(--line);
       display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header.site h1{font-size:18px;margin:0;letter-spacing:.5px}
  header.site .tag{color:var(--muted);font-size:12px}
  .theme-toggle{margin-left:auto;background:var(--chip);color:var(--ink);
       border:1px solid var(--line);border-radius:999px;padding:5px 12px;
       font:inherit;font-size:12px;cursor:pointer}
  .theme-toggle:hover{border-color:var(--accent)}
  main{max-width:1000px;margin:0 auto;padding:18px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .controls input,.controls select{background:var(--panel);color:var(--ink);
       border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit}
  .controls input[type=search]{min-width:240px;flex:1}
  .controls label{display:flex;align-items:center;gap:6px;color:var(--muted);
       font-size:13px;cursor:pointer;white-space:nowrap}
  .controls label input{accent-color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
       overflow:hidden;display:flex;flex-direction:column;color:var(--ink)}
  .card:hover{border-color:var(--accent);text-decoration:none}
  .card .thumb{aspect-ratio:4/3;background:var(--thumb-bg);display:flex;align-items:center;
       justify-content:center;overflow:hidden}
  .card .thumb img{width:100%;height:100%;object-fit:cover}
  .card .thumb .noimg{color:var(--muted);font-size:12px}
  .card .thumb img.ph{width:46%;height:46%;object-fit:contain;opacity:.6}
  .item-head img.ph-lg{width:200px;height:150px;object-fit:contain;padding:32px;
       background:var(--thumb-bg);border:1px solid var(--line);border-radius:12px;opacity:.7}
  .card .body{padding:10px 12px}
  .aid{color:var(--accent);font-size:12px}
  .card .nm{font-size:14px;margin:2px 0 8px;line-height:1.3}
  .chip{display:inline-block;background:var(--chip);color:var(--muted);
       border-radius:999px;padding:2px 9px;font-size:11px;text-transform:uppercase;
       letter-spacing:.4px;margin-right:4px}
  .item-head{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
  .item-head img{max-width:340px;width:100%;border:1px solid var(--line);border-radius:12px}
  .item-head h2{margin:4px 0}
  table.specs{border-collapse:collapse;width:100%;margin-top:14px}
  table.specs td{border-top:1px solid var(--line);padding:7px 8px;vertical-align:top}
  table.specs td.k{color:var(--muted);width:34%;white-space:nowrap}
  .meta{color:var(--muted);font-size:13px;margin-top:12px}
  .back{font-size:13px;margin-bottom:8px}
  footer{color:var(--muted);font-size:12px;padding:24px 18px;
       border-top:1px solid var(--line);margin-top:34px}
  h3.sec{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;
       margin:24px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .build{display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;
       background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  .prow .pt{color:var(--muted);font-size:11px;text-transform:uppercase;
       letter-spacing:.4px;min-width:92px}
  .prow .pn{flex:1;min-width:150px}
  .prow .pid{color:var(--accent);font-size:12px}
  .prow .pspec{color:var(--muted);font-size:12px;flex-basis:100%;margin-top:2px}
  .refs{margin-top:16px;display:flex;gap:16px;flex-wrap:wrap}
  .refs a{font-size:13px}
  .pill{display:inline-block;border:1px solid var(--line);border-radius:999px;
       padding:2px 10px;font-size:12px;color:var(--muted)}
  .pill a{color:var(--accent)}
  img.zoomable{cursor:zoom-in}
  #lightbox{position:fixed;inset:0;z-index:1000;display:none;align-items:center;
       justify-content:center;padding:24px;background:rgba(0,0,0,.82);cursor:zoom-out}
  #lightbox.open{display:flex}
  #lightbox img{max-width:96vw;max-height:92vh;width:auto;height:auto;border-radius:8px;
       box-shadow:0 8px 40px rgba(0,0,0,.5);cursor:default}
  #lightbox .lb-close{position:absolute;top:12px;right:18px;color:#fff;background:none;
       border:none;font-size:32px;line-height:1;cursor:pointer}
  #lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;
       background:rgba(0,0,0,.35);border:none;font-size:34px;line-height:1;
       padding:6px 14px;border-radius:8px;cursor:pointer}
  #lightbox .lb-prev{left:14px}
  #lightbox .lb-next{right:14px}
  .gallery{max-width:340px}
  .gallery .gmain{width:100%;display:block;border:1px solid var(--line);border-radius:12px}
  .thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .thumbs .gthumb{width:56px;height:44px;object-fit:cover;border:1px solid var(--line);
       border-radius:6px;cursor:pointer;opacity:.65}
  .thumbs .gthumb.on,.thumbs .gthumb:hover{opacity:1;border-color:var(--accent)}
  .disposed-banner{background:#7a2e2e;color:#fff;border-radius:8px;padding:8px 12px;
       margin:0 0 14px;font-size:13px;letter-spacing:.3px}
  .card[data-disposed="1"]{opacity:.5}
</style>
</head>
<body>
<header class="site">
  <h1><a href="{{ root }}index.html" style="color:inherit">{{ config.site_title }}</a></h1>
  <span class="tag">retro computers · cards · peripherals</span>
  <button id="themeBtn" class="theme-toggle" type="button" onclick="toggleTheme()"
          aria-label="Toggle light or dark theme">Theme</button>
</header>
<main>
{% block content %}{% endblock %}
</main>
<div id="lightbox" aria-hidden="true">
  <button class="lb-close" type="button" aria-label="Close">&times;</button>
  <button class="lb-nav lb-prev" type="button" aria-label="Previous">&#8249;</button>
  <img src="" alt="">
  <button class="lb-nav lb-next" type="button" aria-label="Next">&#8250;</button>
</div>
<footer>
  Generated from data/computers.csv + data/parts.csv
  {% if config.base_url and 'USERNAME' not in config.base_url %}
    · <a href="{{ config.base_url }}">{{ config.base_url }}</a>
  {% endif %}
</footer>
<script>
  function effectiveTheme(){
    var t = document.documentElement.getAttribute('data-theme');
    if (t) return t;
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
           ? 'dark' : 'light';
  }
  function setThemeLabel(){
    var b = document.getElementById('themeBtn');
    if (b) b.textContent = effectiveTheme() === 'dark' ? 'Light mode' : 'Dark mode';
  }
  function toggleTheme(){
    var next = effectiveTheme() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
    setThemeLabel();
  }
  setThemeLabel();
</script>
<script>
  (function(){
    var lb = document.getElementById('lightbox');
    if (!lb) return;
    var lbImg = lb.querySelector('img');
    var prev = lb.querySelector('.lb-prev');
    var next = lb.querySelector('.lb-next');
    var list = [], idx = 0;
    function galleryList(img){
      var g = img.closest && img.closest('.gallery');
      if (g){
        var thumbs = g.querySelectorAll('.gthumb');
        if (thumbs.length){
          return Array.prototype.map.call(thumbs, function(t){ return t.getAttribute('src'); });
        }
      }
      return [img.getAttribute('src')];
    }
    function show(){
      lbImg.src = list[idx];
      var multi = list.length > 1;
      prev.style.display = next.style.display = multi ? '' : 'none';
    }
    function openLb(img){
      list = galleryList(img);
      idx = list.indexOf(img.getAttribute('src'));
      if (idx < 0) idx = 0;
      show();
      lb.classList.add('open'); lb.setAttribute('aria-hidden', 'false');
    }
    function closeLb(){
      lb.classList.remove('open'); lb.setAttribute('aria-hidden', 'true');
      lbImg.removeAttribute('src');
    }
    function step(d){
      if (list.length < 2) return;
      idx = (idx + d + list.length) % list.length;
      show();
    }
    document.addEventListener('click', function(e){
      var t = e.target;
      if (t.classList && t.classList.contains('gthumb')){
        var g = t.closest('.gallery');
        var main = g && g.querySelector('.gmain');
        if (main){
          main.src = t.getAttribute('src');
          var on = g.querySelectorAll('.gthumb.on');
          for (var i = 0; i < on.length; i++) on[i].classList.remove('on');
          t.classList.add('on');
        }
        return;
      }
      if (t.classList && t.classList.contains('zoomable')){ openLb(t); return; }
      if (t === prev){ step(-1); return; }
      if (t === next){ step(1); return; }
      if (t === lb || (t.classList && t.classList.contains('lb-close'))){ closeLb(); }
    });
    document.addEventListener('keydown', function(e){
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      else if (e.key === 'ArrowLeft') step(-1);
      else if (e.key === 'ArrowRight') step(1);
    });
  })();
</script>
</body>
</html>
