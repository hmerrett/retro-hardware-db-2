services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-retro}
      MARIADB_USER: ${DB_USER:-retro}
      MARIADB_PASSWORD: ${DB_PASSWORD:-retro}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-retro}:${DB_PASSWORD:-retro}@db:3306/${DB_NAME:-retro}
      RHDB_BASE_URL: ${RHDB_BASE_URL:-https://hmerrett.github.io/retro-hardware-database}
      RHDB_AUTH_USER: ${RHDB_AUTH_USER:-}
      RHDB_AUTH_PASSWORD: ${RHDB_AUTH_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - images:/app/images
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build: ./mcp
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      RHDB_AUTH_USER: ${RHDB_AUTH_USER:-}
      RHDB_AUTH_PASSWORD: ${RHDB_AUTH_PASSWORD:-}
    ports:
      - "8001:8001"
    depends_on:
      - api

volumes:
  dbdata:
  images:
