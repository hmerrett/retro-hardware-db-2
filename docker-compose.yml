services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-retro}
      MARIADB_USER: ${DB_USER:-retro}
      MARIADB_PASSWORD: ${DB_PASSWORD:-retro}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-retro}:${DB_PASSWORD:-retro}@db:3306/${DB_NAME:-retro}
      RHDB_BASE_URL: ${RHDB_BASE_URL:-https://db.2600.me}
      RHDB_AUTH_USER: ${RHDB_AUTH_USER:-}
      RHDB_AUTH_PASSWORD: ${RHDB_AUTH_PASSWORD:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - images:/app/images
      - goaccess_report:/app/stats:ro
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build: ./mcp
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      RHDB_AUTH_USER: ${RHDB_AUTH_USER:-}
      RHDB_AUTH_PASSWORD: ${RHDB_AUTH_PASSWORD:-}
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - api

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - api

  # Turns Caddy's access log into a self-contained HTML traffic report every
  # minute; the app serves it (login-only) at /stats.
  goaccess:
    image: allinurl/goaccess:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          if [ -s /logs/access.log ]; then
            goaccess /logs/access.log -o /report/index.html \
              --log-format=CADDY --html-report-title="db.2600.me traffic"
          fi
          sleep 60
        done
    volumes:
      - caddy_logs:/logs:ro
      - goaccess_report:/report
    depends_on:
      - caddy

volumes:
  dbdata:
  images:
  caddy_data:
  caddy_config:
  caddy_logs:
  goaccess_report:
