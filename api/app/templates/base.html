<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Retro Hardware Database{% endblock %}</title>
<style>
  :root { color-scheme: light dark; --line: #8884; --muted: #8a8a8a; --accent: #3b82f6; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; line-height: 1.5; }
  header { padding: 12px 18px; border-bottom: 1px solid var(--line); display: flex; gap: 14px; align-items: baseline; }
  header a { text-decoration: none; }
  header .brand { font-weight: 600; }
  main { max-width: 1000px; margin: 0 auto; padding: 18px; }
  a { color: var(--accent); }
  table { border-collapse: collapse; width: 100%; }
  th, td { border-top: 1px solid var(--line); padding: 6px 8px; text-align: left; vertical-align: top; }
  th { color: var(--muted); font-weight: 500; font-size: 13px; }
  .btn { display: inline-block; border: 1px solid #8886; border-radius: 7px; padding: 5px 11px; text-decoration: none; font-size: 14px; cursor: pointer; background: #8881; color: inherit; }
  .btn:hover { background: #8882; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.sm { padding: 3px 8px; font-size: 13px; }
  .row-actions a { font-size: 13px; margin-right: 8px; }
  form.edit label { display: block; margin: 10px 0 3px; color: var(--muted); font-size: 13px; }
  form.edit input, form.edit textarea, form.edit select { width: 100%; padding: 7px 8px; border: 1px solid #8886; border-radius: 6px; font: inherit; background: transparent; color: inherit; }
  form.edit textarea { min-height: 60px; }
  .hint { color: var(--muted); font-size: 12px; margin: 2px 0 0; }
  .muted { color: var(--muted); }
  .chip { display: inline-block; background: #8882; border-radius: 999px; padding: 1px 8px; font-size: 12px; }
  .banner { background: #b4530022; border: 1px solid #b45300aa; border-radius: 8px; padding: 8px 12px; margin: 10px 0; }
  .build-banner { background: #3b82f622; border: 1px solid #3b82f6aa; border-radius: 8px; padding: 10px 12px; margin: 12px 0; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 12px 0; }
  .toolbar input[type=search], .toolbar select { padding: 7px 9px; border: 1px solid #8886; border-radius: 7px; font: inherit; background: transparent; color: inherit; }
  .thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
  .thumbs img { height: 110px; border-radius: 8px; border: 1px solid var(--line); object-fit: cover; }
  .photo-main { max-width: 320px; max-height: 320px; border-radius: 10px; border: 1px solid var(--line); }
  img.zoomable { cursor: zoom-in; }
  #lightbox { position: fixed; inset: 0; background: #000000d8; display: none; align-items: center; justify-content: center; z-index: 1000; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; box-shadow: 0 6px 40px #000; }
  #lightbox button { position: absolute; background: #ffffff1a; color: #fff; border: none; cursor: pointer; user-select: none; border-radius: 8px; }
  #lightbox .lb-nav { top: 50%; transform: translateY(-50%); font-size: 38px; padding: 6px 16px; }
  #lightbox .lb-prev { left: 3vw; } #lightbox .lb-next { right: 3vw; }
  #lightbox .lb-close { top: 3vh; right: 3vw; font-size: 30px; padding: 2px 12px; }
  .section { margin-top: 24px; }
  .flex { display: flex; align-items: baseline; gap: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-top: 14px; }
  .card { display: block; background: #8880; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; }
  .card:hover { border-color: var(--accent); }
  .card .thumb { aspect-ratio: 4 / 3; background: #8881; display: flex; align-items: center; justify-content: center; }
  .card .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card .thumb img.ph { width: 46%; height: 46%; object-fit: contain; opacity: .55; }
  .card .body { padding: 9px 11px; }
  .card .aid { font-size: 12px; color: var(--muted); }
  .card .nm { font-size: 14px; margin: 2px 0 7px; line-height: 1.3; }
  .card[data-disposed="1"] { opacity: .5; }
  .count { color: var(--muted); font-size: 13px; }
  fieldset { border: 1px solid var(--line); border-radius: 8px; margin: 14px 0; padding: 8px 14px 14px; }
  legend { color: var(--muted); font-size: 13px; padding: 0 6px; }
  .inline-form { display: inline; }
</style>
</head>
<body>
<header>
  <a class="brand" href="/">Retro Hardware Database</a>
  <a href="/docs">API docs</a>
</header>
<main>{% block content %}{% endblock %}</main>
<div id="lightbox">
  <button class="lb-close" title="Close (Esc)">×</button>
  <button class="lb-nav lb-prev" title="Previous">‹</button>
  <img alt="">
  <button class="lb-nav lb-next" title="Next">›</button>
</div>
<script>
  (function () {
    const box = document.getElementById('lightbox');
    const img = box.querySelector('img');
    const prev = box.querySelector('.lb-prev');
    const next = box.querySelector('.lb-next');
    let list = [], idx = 0;
    function show() {
      img.src = list[idx];
      const multi = list.length > 1;
      prev.style.display = next.style.display = multi ? '' : 'none';
    }
    function close() { box.classList.remove('open'); img.src = ''; }
    function step(d) { if (list.length) { idx = (idx + d + list.length) % list.length; show(); } }
    const zoomables = document.querySelectorAll('img.zoomable');
    zoomables.forEach((el, i) => el.addEventListener('click', () => {
      list = Array.from(zoomables).map(x => x.dataset.full || x.src);
      idx = i;
      box.classList.add('open');
      show();
    }));
    prev.addEventListener('click', e => { e.stopPropagation(); step(-1); });
    next.addEventListener('click', e => { e.stopPropagation(); step(1); });
    box.querySelector('.lb-close').addEventListener('click', close);
    box.addEventListener('click', e => { if (e.target === box) close(); });
    document.addEventListener('keydown', e => {
      if (!box.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowLeft') step(-1);
      else if (e.key === 'ArrowRight') step(1);
    });
  })();
</script>
</body>
</html>
