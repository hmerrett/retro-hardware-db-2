{% extends "base.html" %}
{% block title %}Log in — Retro Hardware Database{% endblock %}
{% block content %}
<h2>Log in</h2>
{% if error %}<p class="banner">Incorrect username or password.</p>{% endif %}
<form class="edit" method="post" action="/login" style="max-width:320px">
  <input type="hidden" name="next" value="{{ next }}">
  <label for="username">Username</label>
  <input id="username" name="username" autofocus autocomplete="username">
  <label for="password">Password</label>
  <input id="password" name="password" type="password" autocomplete="current-password">
  <p style="margin-top:14px"><button class="btn primary" type="submit">Log in</button></p>
</form>
{% endblock %}
